<style>

  html[data-theme="dark"] {

    --global-bg-color: #1b1b1b;
    --global-footer-bg-color: #151515;
    --global-border-color: #363636;

  body,
  button,
  input,
  select,

  }

  .masthead,
  .archive__item-title,

    font-family: "Merriweather", Georgia, "Times New Roman", serif;
  }

  .masthead,
  .masthead a,
  .sidebar,
  .sidebar .author__name,
  .sidebar .author__bio,

  .sidebar .author__urls a,

  }

  html:not([data-theme="dark"]) h1,
  html:not([data-theme="dark"]) h2,
  html:not([data-theme="dark"]) h3,
  html:not([data-theme="dark"]) h4,

    width: 26px;
    height: 26px;
    object-fit: contain;
    vertical-align: text-bottom;
    margin-right: 0px;
  }

    height: 54px;

    margin-right: 0;
  }

    background-color: rgba(0, 0, 0, 0.84);
